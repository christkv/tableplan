spring:
  application:
    name: tableplan
  threads:
    virtual:
      enabled: ${TABLEPLAN_VIRTUAL_THREADS:true}
# Google OAuth remains disabled unless the standard Spring Google client ID and secret
# environment properties are supplied.
  lifecycle:
    timeout-per-shutdown-phase: 20s
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
server:
  port: ${SERVER_PORT:9090}
  shutdown: graceful
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: 10m
      cookie:
        http-only: true
        same-site: lax
  compression:
    enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
tableplan:
  public-origin: ${TABLEPLAN_PUBLIC_ORIGIN:http://localhost:9090}
  delivery-secret: ${TABLEPLAN_DELIVERY_SECRET:}
  auth:
    session-cookie-secure: ${TABLEPLAN_SESSION_COOKIE_SECURE:false}
  mongo:
    uri: ${TABLEPLAN_MONGO_URI:mongodb://127.0.0.1:27017/?replicaSet=rs0}
    database: ${TABLEPLAN_MONGO_DATABASE:application_local}
    max-pool-size: ${TABLEPLAN_MONGO_MAX_POOL_SIZE:20}
    min-pool-size: ${TABLEPLAN_MONGO_MIN_POOL_SIZE:0}
    wait-queue-timeout-ms: ${TABLEPLAN_MONGO_WAIT_QUEUE_TIMEOUT_MS:2000}
    server-selection-timeout-ms: ${TABLEPLAN_MONGO_SERVER_SELECTION_TIMEOUT_MS:3000}
  jobs:
    enabled: ${JOBS_ENABLED:false}
    concurrency: ${TABLEPLAN_JOB_CONCURRENCY:2}
  artifacts:
    mode: ${TABLEPLAN_ARTIFACT_MODE:local}
    local-directory: ${TABLEPLAN_ARTIFACT_DIRECTORY:artifacts}
    max-megabytes: ${TABLEPLAN_ARTIFACT_MAX_MEGABYTES:10}
    bucket: ${TABLEPLAN_ARTIFACT_BUCKET:}
    region: ${TABLEPLAN_ARTIFACT_REGION:auto}
    endpoint: ${TABLEPLAN_ARTIFACT_ENDPOINT:}
    path-style-access: ${TABLEPLAN_ARTIFACT_PATH_STYLE:false}
    chunked-encoding-enabled: ${TABLEPLAN_ARTIFACT_CHUNKED_ENCODING_ENABLED:true}
    send-server-side-encryption-header: ${TABLEPLAN_ARTIFACT_SEND_SSE_HEADER:true}
    access-key-id: ${TABLEPLAN_ARTIFACT_ACCESS_KEY_ID:${AWS_ACCESS_KEY_ID:}}
    secret-access-key: ${TABLEPLAN_ARTIFACT_SECRET_ACCESS_KEY:${AWS_SECRET_ACCESS_KEY:}}
    session-token: ${TABLEPLAN_ARTIFACT_SESSION_TOKEN:${AWS_SESSION_TOKEN:}}
  extraction:
    provider: ${TABLEPLAN_EXTRACTION_PROVIDER:deterministic}
    openrouter-api-key: ${OPENROUTER_API_KEY:}
    openrouter-model: ${TABLEPLAN_OPENROUTER_MODEL:openai/gpt-4.1-mini}
    openrouter-base-url: ${TABLEPLAN_OPENROUTER_BASE_URL:https://openrouter.ai/api/v1/chat/completions}
    timeout-seconds: ${TABLEPLAN_EXTRACTION_TIMEOUT_SECONDS:45}
  email:
    cloudflare-account-id: ${TABLEPLAN_EMAIL_CLOUDFLARE_ACCOUNT_ID:${CLOUDFLARE_ACCOUNT_ID:}}
    cloudflare-api-token: ${TABLEPLAN_EMAIL_CLOUDFLARE_API_TOKEN:}
    timeout-seconds: ${TABLEPLAN_EMAIL_TIMEOUT_SECONDS:15}
    from-address: ${TABLEPLAN_EMAIL_FROM_ADDRESS:}
    from-name: ${TABLEPLAN_EMAIL_FROM_NAME:Table Rhythm Alpha}
